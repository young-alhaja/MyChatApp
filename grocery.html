<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simple To-Do List</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

body {
  background: #f4f4f4;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.container {
  background: #fff;
  width: 350px;
  padding: 20px;
  border-radius: 10px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

h2 {
  text-align: center;
  margin-bottom: 15px;
}

.input-box {
  display: flex;
  gap: 10px;
  margin-bottom: 15px;
}

.input-box input {
  flex: 1;
  padding: 10px;
  border: 1px solid #ccc;
  border-radius: 5px;
}

.input-box button {
  padding: 10px 15px;
  border: none;
  background: #4CAF50;
  color: #fff;
  border-radius: 5px;
  cursor: pointer;
}

ul {
  list-style: none;
}

li {
  background: #f9f9f9;
  padding: 10px;
  margin-bottom: 10px;
  border-radius: 5px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

li span {
  cursor: pointer;
  color: red;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="container">
  <h2>Grocery List</h2>

  <div class="input-box">
    <input type="text" id="task_text" placeholder="Add a new task...">
    <button onclick="addList({text:document.getElementById('task_text').value})">Add</button>
  </div>

  <ul id="menu_list">
    <li>Buy groceries <span>×</span></li>
    <button class="delete">Del</button>
  </ul>  

</div>
<script src="./grocery.js"></script>
</body>
</html>
