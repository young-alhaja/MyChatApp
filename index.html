<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Modern Chat UI</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }

    body {
      height: 100vh;
      background: linear-gradient(135deg, #1e1e2f, #2a2a40);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .chat-container {
      width: 95%;
      height: 95vh;
      display: flex;
      border-radius: 20px;
      overflow: hidden;
      backdrop-filter: blur(20px);
      background: rgba(255, 255, 255, 0.05);
      box-shadow: 0 20px 50px rgba(0,0,0,0.5);
    }

    /* Sidebar */
    .sidebar {
      width: 30%;
      background: rgba(255,255,255,0.08);
      border-right: 1px solid rgba(255,255,255,0.1);
      display: flex;
      flex-direction: column;
    }

    .sidebar-header {
      padding: 20px;
      font-size: 20px;
      font-weight: 600;
      color: #fff;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    .chat-list {
      flex: 1;
      overflow-y: auto;
    }

    .chat-item {
      display: flex;
      align-items: center;
      gap: 15px;
      padding: 15px 20px;
      cursor: pointer;
      transition: all 0.3s;
      color: #ddd;
    }

    .chat-item:hover {
      background: rgba(255,255,255,0.1);
    }

    .avatar {
      width: 45px;
      height: 45px;
      border-radius: 50%;
      background: linear-gradient(135deg, #6a5af9, #d66efd);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-weight: 600;
    }

    .chat-info {
      flex: 1;
    }

    .chat-name {
      font-weight: 500;
      color: #fff;
    }

    .chat-preview {
      font-size: 12px;
      color: #aaa;
    }

    /* Chat area */
    .chat-area {
      width: 70%;
      display: flex;
      flex-direction: column;
    }

    .chat-header {
      padding: 20px;
      display: flex;
      align-items: center;
      gap: 15px;
      background: rgba(255,255,255,0.08);
      border-bottom: 1px solid rgba(255,255,255,0.1);
      color: #fff;
    }

    .messages {
      flex: 1;
      padding: 20px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .message {
      max-width: 60%;
      padding: 12px 16px;
      border-radius: 18px;
      font-size: 14px;
      line-height: 1.4;
      position: relative;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .sent {
      align-self: flex-end;
      background: linear-gradient(135deg, #6a5af9, #d66efd);
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .received {
      align-self: flex-start;
      background: rgba(255,255,255,0.1);
      color: #fff;
      border-bottom-left-radius: 4px;
    }

    .chat-input {
      display: flex;
      padding: 15px;
      gap: 10px;
      background: rgba(255,255,255,0.08);
      border-top: 1px solid rgba(255,255,255,0.1);
    }

    .chat-input input {
      flex: 1;
      padding: 12px 15px;
      border-radius: 25px;
      border: none;
      outline: none;
      background: rgba(255,255,255,0.1);
      color: #fff;
    }

    .chat-input input::placeholder {
      color: #aaa;
    }

    .chat-input button {
      padding: 12px 20px;
      border: none;
      border-radius: 25px;
      background: linear-gradient(135deg, #6a5af9, #d66efd);
      color: #fff;
      cursor: pointer;
      transition: 0.3s;
    }

    .chat-input button:hover {
      transform: scale(1.05);
      box-shadow: 0 5px 15px rgba(0,0,0,0.3);
    }

    @media (max-width: 768px) {
      .sidebar { display: none; }
      .chat-area { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="chat-container">
    <div class="sidebar">
      <div class="sidebar-header">💬 Chats</div>
      <div class="chat-list">
        <div class="chat-item">
          <div class="avatar">J</div>
          <div class="chat-info">
            <div class="chat-name">John Doe</div>

        <div class="chat-item">

        <div class="chat-item">

            <div class="chat-name">Michael</div>

          </div>
        </div>
      </div>
    </div>

    <div class="chat-area">
      <div class="chat-header">

        John Doe
      </div>

      <div class="messages">

        <div class="message sent">All good here 😎</div>
      </div>

      <div class="chat-input">
        <input type="text" placeholder="Type a message..." />
        <button>Send</button>
      </div>
    </div>
  </div>
